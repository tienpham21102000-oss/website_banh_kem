version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: banh_kem_postgres
    environment:
      POSTGRES_USER: banh_kem_user
      POSTGRES_PASSWORD: banh_kem_password
      POSTGRES_DB: banh_kem_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/migrations:/docker-entrypoint-initdb.d
    networks:
      - banh_kem_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banh_kem_user -d banh_kem_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: banh_kem_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - banh_kem_network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

backend:
    build:
      context: ./backend
    container_name: banh_kem_backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/usr/src/app
    networks:
      - banh_kem_network
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
    container_name: banh_kem_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/usr/src/app
    networks:
      - banh_kem_network

networks:
  banh_kem_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
